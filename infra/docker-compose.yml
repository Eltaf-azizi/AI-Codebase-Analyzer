version: "3.9"
services:
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000/api/v1
    ports:
      - "3001:3001"
    depends_on:
      - backend
